<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>AGE</td>
    <td>50</td>
    <td>0.30</td>
    <td>19.51</td>
    <td>10.41</td>
  </tr>
  <tr>
    <td>BALANCE</td>
    <td>50</td>
    <td>3.00</td>
    <td>98.00</td>
    <td>51.92</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: NAME</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>ALICE</td><td>12</td></tr><tr><td>MATHEW</td><td>12</td></tr><tr><td>ARTUR</td><td>10</td></tr><tr><td>ILYA</td><td>10</td></tr><tr><td>VADIM</td><td>6</td></tr></tbody>
  </table>
  <h2>Колонка: SURNAME</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>BYSTRITSKY</td><td>12</td></tr><tr><td>PAVLOV</td><td>12</td></tr><tr><td>SHTEYNBERG</td><td>10</td></tr><tr><td>TUYZUKOV</td><td>8</td></tr><tr><td>MAZOXHIN</td><td>8</td></tr></tbody>
  </table>
</body>
</html>
